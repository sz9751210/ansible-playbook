---
- name: Create instances
  hosts:  elastic_slave
  gather_facts: no
  connection: local
  vars_files:
    - vars/instance/instance_var.yml
  tasks:
    - include_tasks: roles/instance/tasks/create.yml
      run_once: true

- name: Setup instances
  hosts:  elastic_slave
  become: yes
  become_user: root
  gather_facts: no
  tasks: 
    - include_tasks: roles/instance/tasks/setup.yml

- name: Create Disk
  hosts: elastic_slave
  gather_facts: no
  connection: local
  vars_files:
    - vars/instance/instance_var.yml
  tasks:
    - include_tasks: roles/instance/tasks/create_disk.yml
      run_once: true

- name: Setup Disk
  hosts: elastic_slave
  become: yes
  become_user: root
  gather_facts: no
  vars_files:
    - vars/instance/instance_var.yml
  tasks:
    - include_tasks: roles/instance/tasks/setup_disk.yml

- name: Install Elastic Slave
  hosts: elastic_slave
  become: yes
  become_user: root
  gather_facts: no
  vars_files:
    - vars/instance/instance_var.yml
    - vars/elasticsearch/elasticsearch_var.yml
    - vars/elasticsearch/token
  tasks: 
    - include_tasks: roles/elasticsearch/tasks/main.yml
